      summary: 'Get Monitor Fields'
      description: 'Returns the list of employee fields that can be monitored by a webhook. Use these field IDs or aliases in the `monitorFields` array when creating or updating a webhook. Each entry includes a numeric field ID (returned as a string), a human-readable name, and an alias (if one exists; otherwise null).'

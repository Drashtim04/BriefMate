      summary: 'Get Field Options'
      description: "Retrieve the possible values for one or more dataset fields, for use as filter values in dataset queries. Pass the field names you want options for in the `fields` array. The response is an object keyed by field name, where each value is an array of `{id, value}` objects. Use the `id` values as filter values when querying POST /api/v1/datasets/{datasetName}. Optionally supply `filters` to scope the returned options (e.g., returning only option values that exist for active employees).\n\n**Deprecation notice:** For RFC 7807 compliant error responses, use POST /api/v1_2/datasets/{datasetName}/field-options instead."

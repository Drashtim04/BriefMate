              schema:
                title: FieldList
                properties:
                  fields: { type: array, items: { properties: { id: { description: 'The field ID, returned as a string.', type: string, example: '4175' }, name: { description: 'The human-readable field name.', type: string }, alias: { description: 'The field alias used in the BambooHR API (e.g. `firstName`). Null if no alias is defined for this field.', type: [string, 'null'] } }, type: object } }
                type: object

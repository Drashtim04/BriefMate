          oauth:
            - webhooks
  '/api/v1/datasets/{datasetName}':
    post:
      tags:
        - Datasets
        - 'Public API'
      summary: 'Get Data from Dataset'
      description: "Retrieve data from the specified dataset. You must provide a list of fields to return; use GET /api/v1/datasets/{datasetName}/fields to discover available field names. Returns a paginated list of records under the `data` key, along with optional `aggregations` and a `pagination` block.\n\nResults default to 500 records per page. Use the `page` and `page_size` query parameters to paginate through large result sets.\n\n**Deprecation notice:** This endpoint is deprecated. Use POST /api/v2/datasets/{datasetName}/data instead.\n\n***Field Settings:***\n\n**Show History**\nWhen any of the fields included in your request are historical table fields, you may include the `showHistory` setting. Example: `\"showHistory\":[\"entityName\"]`. Entity Name can be found in the GET /api/v1/datasets/{datasetName}/fields endpoint.\n\n**Sort By:**\nPass multiple fields to sort by as an array of objects `{field: \"fieldName\", sort: \"asc\"}`. The order of the fields in the array determines the sort priority.\n\n**Group By:**\nPassed as an array of strings. Currently grouping by more than one field is not supported.\n\n**Aggregations:**\nWhen using aggregations the following aggregates are available based on field type:\n  - **text**: count\n  - **date**: count, min, max\n  - **int**: count, min, max, sum, avg\n  - **bool**: count\n  - **options**: count\n  - **govIdText**: count\n\n**Filters:**\nWhen using filters, the filtered field does not have to be in the list of fields you want to show on the report.\n\n**Important Filter Notes:**\n  - **List filter values** (for `options` field type using `includes` or `does_not_include` operators) must be enclosed in square brackets [ ]. Example: `[\"value1\", \"value2\"]`\n  - **Future hires**: Future hires have a status of `Inactive` in the datasets API. To include future hires in your results, you must include `Inactive` in your status filter.\n\nUse GET /api/v1/datasets/{datasetName}/field-options to retrieve possible filter values for fields. Use the `id` returned from the field-options endpoint.\n\n**Filter Operators by Field Type:**\n  - **text**: contains, does_not_contain, equal, not_equal, empty, not_empty\n  - **date**: lt, lte, gt, gte, equal, not_equal, empty, not_empty, last (value: `{\"duration\": \"5\", \"unit\": \"years\"}`), next, range (value: `{\"start\": \"2023-01-01\", \"end\": \"2023-12-31\"}`)\n  - **int**: equal, not_equal, gte, gt, lte, lt, empty, not_empty\n  - **bool**: checked, not_checked\n  - **options**: includes, does_not_include, empty, not_empty\n  - **govIdText**: empty, not_empty\n"
      operationId: get-data-from-dataset
      parameters:
        -
          name: datasetName
          in: path
          description: 'The name of the dataset you want data from'
          required: true
          schema:
            type: string
        -
          name: page
          in: query
          description: 'The page number to retrieve. Defaults to 1.'
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        -
          name: page_size
          in: query
          description: 'The number of records to retrieve per page. Defaults to 500. Maximum is 1000.'
          required: false
          schema:
            type: integer
            default: 500
            maximum: 1000
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataRequest'
      responses:
        '200':
          description: 'Data from the dataset successfully requested'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '400':
          description: 'Invalid or missing argument(s)'
          content:
            application/json: {  }
        '403':
          description: 'You do not have permissions to hit this endpoint'
          content:
            application/json: {  }
        '500':
          description: 'An unexpected error occurred while getting the data'
          content:
            application/json: {  }
      security:
        -
          basic: []
        -
          oauth:
            - report

  /api/v1/benefits/member-benefits:
    get:
      tags:
        - Benefits
        - 'Public API'
      summary: 'Get Member Benefits'
      description: 'Retrieves a paginated list of member benefits for a specified calendar year. Returns benefit enrollment data including member IDs, subscriber IDs, plan IDs, and date ranges with enrollment status. Requires benefit admin permissions.'
      operationId: get-member-benefits
      parameters:
        -
          name: calendarYear
          in: query
          description: 'The 4-digit calendar year to retrieve benefits for'
          required: true
          schema:
            type: string
            pattern: '^\d{4}$'
            example: '2024'
        -
          name: page
          in: query
          description: 'The page number for pagination'
          required: false
          schema:
            type: string
            default: '1'
            example: '1'
        -
          name: pageSize
          in: query
          description: 'The number of items per page (must be less than 100)'
          required: false
          schema:
            type: string
            default: '25'
            maximum: 99
            example: '25'
      responses:
        '200':
          description: 'Successfully retrieved member benefits'
          content:
            application/json:
              schema:
                title: MemberBenefitsGetSuccessResponse
                properties:
                  data: { type: array, items: { properties: { memberId: { description: 'The member ID', type: string }, subscriberId: { description: 'The subscriber ID', type: string }, plans: { type: array, items: { properties: { planId: { description: 'The benefit plan ID', type: string }, dateRanges: { type: array, items: { properties: { startDate: { description: 'Start date of the benefit enrollment', type: string }, endDate: { description: 'End date of the benefit enrollment', type: [string, 'null'] }, status: { description: 'Enrollment status', type: string } }, type: object } } }, type: object } } }, type: object } }
                  meta: { properties: { page: { description: 'Current page number', type: integer }, pageSize: { description: 'Number of items per page', type: integer }, totalPages: { description: 'Total number of pages', type: integer }, totalItems: { description: 'Total number of items', type: integer } }, type: object }
                  _links: { properties: { next: { properties: { href: { description: 'URL for the next page', type: [string, 'null'] } }, type: object }, prev: { properties: { href: { description: 'URL for the previous page', type: [string, 'null'] } }, type: object } }, type: object }
                type: object
        '400':
          description: 'Validation error'
          content:
            application/json:
              schema:
                title: MemberBenefitsGetValidationErrorResponse
                properties:
                  code: { type: string, example: VALIDATION_ERROR }
                  message: { type: string, example: 'required property calendarYear is missing' }
                type: object
        '403':
          description: 'Permission denied'
          content:
            application/json:
              schema:
                title: MemberBenefitsGetPermissionDeniedResponse
                properties:
                  code: { type: string, example: PERMISSION_DENIED }
                  message: { type: string, example: 'Must be benefit admin user' }
                type: object
      security:
        -
          basic: []
        -
          oauth:
            - benefit
  /api/v1/benefits/settings/deduction_types/all:
    get:
      tags:

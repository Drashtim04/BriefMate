        - 'Public API'
      summary: 'Get Datasets v1.2'
      description: "Retrieve the list of available datasets that can be queried. Returns each dataset's machine-readable name (used in subsequent dataset API calls) and its human-readable label. Use the returned `name` values with POST /api/v1/datasets/{datasetName} to query data, and GET /api/v1_2/datasets/{datasetName}/fields to discover available fields. V1.2 endpoint: error responses use RFC 7807 `application/problem+json`."
      operationId: get-datasets-v1-2
      responses:
        '200':
          description: 'Successfully retrieved list of available datasets'
          headers:
            X-Request-ID:
              description: 'Correlation ID for request tracing'
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                title: DatasetsResponse
                properties:
                  datasets: { description: 'Array of available datasets', type: array, items: { properties: { name: { description: 'Internal name identifier for the dataset', type: string, example: employee }, label: { description: 'Human-readable label for the dataset', type: string, example: Employee } }, type: object } }
                type: object
              example:
                datasets:
                  - { name: employee, label: Employee }
                  - { name: benefit, label: 'Benefit Elections' }
                  - { name: applicants, label: Applicants }
        '403':
          description: 'Forbidden - insufficient permissions to access datasets'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error while retrieving datasets'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          basic: []
        -
          oauth:
            - report
  '/api/v1_2/datasets/{datasetName}/fields':
    get:
      tags:
        - Datasets
        - 'Public API'
      summary: 'Get Fields from Dataset v1.2'
      description: "Retrieve the available fields for a given dataset. Returns a paginated list of field descriptors, each including the field's machine-readable name, human-readable label, parent section type and name, and the entity name. Use the returned field `name` values in the `fields` array when querying data via POST /api/v1/datasets/{datasetName}. V1.2 endpoint: error responses use RFC 7807 `application/problem+json`."
      operationId: get-fields-from-dataset-v1-2
      parameters:
        -
          name: datasetName
          in: path
          description: 'The name of the dataset you want to see fields for'
          required: true
          schema:
            type: string
        -
          name: page
          in: query
          description: 'The page number to retrieve. Defaults to 1.'
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        -
          name: page_size
          in: query
          description: 'The number of records to retrieve per page. Defaults to 500. Maximum is 1000.'
          required: false
          schema:
            type: integer
            default: 500
            maximum: 1000
            minimum: 1
      responses:
        '200':
          description: 'Fields of the dataset'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetFieldsResponse'
        '403':
          description: 'You do not have permissions to hit this endpoint'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '422':
          description: 'Dataset not found'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Something went wrong while fetching the dataset configuration'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
      security:
        -
          basic: []
        -
          oauth:
            - report
  '/api/v1_2/datasets/{datasetName}/field-options':
    post:
      tags:
        - Datasets
        - 'Public API'
      summary: 'Get Field Options v1.2'
      description: 'Retrieve the possible values for one or more dataset fields, for use as filter values in dataset queries. Pass the field names you want options for in the `fields` array. The response is an object keyed by field name, where each value is an array of `{id, value}` objects. Use the `id` values as filter values when querying dataset endpoints. Optionally supply `filters` to scope the returned options. V1.2 endpoint: `400` and `403` error responses use RFC 7807 `application/problem+json`. Note: unrecognised field names may result in a `500` response with a plain-text body rather than a structured error payload.'
      operationId: get-field-options-v1-2
      parameters:
        -
          name: datasetName
          in: path
          description: 'The name of the dataset you want to see field options for'
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldOptionsRequestSchema'
      responses:
        '200':
          description: 'An object keyed by field name, where each value is an array of available option objects for that field.'
          content:
            application/json:
              schema:
                title: FieldOptionsResponse
                type: object
                additionalProperties:
                  type: array
                  items: { $ref: '#/components/schemas/FieldOptionsTransformer' }
              example:
                status:
                  - { id: Active, value: Active }
                  - { id: Inactive, value: Inactive }
        '400':
          description: 'Bad request - invalid fields, filters, or request format'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '403':
          description: 'Permissions error - user does not have access to this dataset'
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetailsResponse'
        '500':
          description: 'Internal server error. The response body may be plain text rather than a structured payload.'
      security:
        -
          basic: []
        -
          oauth:
            - field
  /api/v1/applicant_tracking/applications:
    get:
      tags:
        - 'Public API'
        - 'Applicant Tracking'
      summary: 'Get Job Applications'
      description: 'Get a list of applications. The owner of the API key used must have access to ATS settings. Combine as many different optional parameter filters as you like.'
      operationId: get-applications
      parameters:
        -
          name: page
          in: query
          description: 'The page number'
          schema:
            type: integer
        -
          name: jobId
          in: query
          description: 'A Job Id to limit results to'
          schema:
            type: integer
        -
          name: applicationStatusId
          in: query
          description: 'Application status id to filter by.'
          schema:
            type: integer
        -
          name: applicationStatus
          in: query
          description: 'A list of application status groups to filter by.'
          schema:
            type: string
            enum:
              - ALL
              - ALL_ACTIVE
              - NEW
              - ACTIVE
              - INACTIVE
              - HIRED
        -
          name: jobStatusGroups
          in: query
          description: 'A list of position status groups to filter by.'
          schema:
            type: string
            enum:
              - ALL
              - DRAFT_AND_OPEN
              - Open
              - Filled
              - Draft
              - Deleted
              - 'On Hold'
              - Canceled
        -
          name: searchString
          in: query
          description: 'A general search criteria by which to find applications.'
          schema:
            type: string
        -
          name: sortBy
          in: query
          description: 'A specific field to sort the results by.'
          schema:
            type: string
            enum:
              - first_name
              - job_title
              - rating
              - phone
              - status
              - last_updated
              - created_date
        -
          name: sortOrder
          in: query
          description: 'Order by which to sort results.'
          schema:
            type: string
            enum:
              - ASC
              - DESC
        -
          name: newSince
          in: query
          description: 'Only get applications newer than a given UTC timestamp, for example 2024-01-01 13:00:00'
          schema:
            type: string
            format: date-time

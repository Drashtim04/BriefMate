  /api/v1/webhooks:
    get:
      tags:
        - Webhooks
        - 'Public API'
      summary: 'List Webhooks'
      description: 'Returns all webhooks owned by the authenticated user API key. Returns an empty array if no webhooks have been created for this key. Each entry includes the webhook ID, name, URL, creation datetime, and the datetime it was last fired. Use `GET /api/v1/webhooks/{id}` to retrieve the full configuration including monitored fields, post fields, and events for a specific webhook.'
      operationId: list-webhooks
      responses:
        '200':
          description: 'An object with a `webhooks` array containing one entry per webhook owned by the authenticated user API key. Returns an empty array when no webhooks exist for this key.'
          content:
            application/json:
              schema:
                title: WebhooksList
                properties:
                  webhooks: { type: array, items: { properties: { id: { description: 'The ID of the webhook.', type: string, example: '1' }, name: { description: 'The name of the webhook.', type: string }, created: { description: 'Datetime when the webhook was created (UTC, format: YYYY-MM-DD HH:MM:SS).', type: string }, lastSent: { description: 'Datetime when the webhook was last fired (UTC, format: YYYY-MM-DD HH:MM:SS). Null if the webhook has never fired.', type: [string, 'null'] }, url: { description: 'The URL the webhook sends data to.', type: string } }, type: object } }
                type: object
        '401':
          description: 'The user API key is invalid.'
          content:
            application/json: {  }
        '500':
          description: 'Internal error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookError'
      security:
        -
          basic: []
        -
          oauth:
            - webhooks
    post:
      tags:
        - Webhooks
        - 'Public API'
      summary: 'Create Webhook'
      description: "Creates a new webhook for the authenticated user's API key. The webhook will fire when the specified events occur or when any of the monitored fields change.\n\nThe `monitorFields` array is required when `events` includes `employee.updated` or `employee_with_fields.updated`. If `events` is omitted, it defaults to `['employee_with_fields.updated', 'employee_with_fields.deleted', 'employee_with_fields.created']`, which means `monitorFields` is required by default. The `format` field is required.\n\nThe response includes a `privateKey` that can be used to verify the authenticity of incoming webhook payloads via HMAC-SHA256. This key is only returned at creation time and cannot be retrieved again.\n\nFor more details refer to the [webhooks documentation](https://documentation.bamboohr.com/docs/webhooks), including guides for [event-based](https://documentation.bamboohr.com/docs/event-based-webhooks) and [field-based](https://documentation.bamboohr.com/docs/field-based-webhooks) webhooks.\n\nFor details on the payloads sent by each event, see the event reference:\n- [employee.created](https://documentation.bamboohr.com/reference/employee-created-webhook)\n- [employee.updated](https://documentation.bamboohr.com/reference/employee-updated-webhook)\n- [employee.deleted](https://documentation.bamboohr.com/reference/employee-deleted-webhook)"
      operationId: create-webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewWebHook'
      responses:
        '201':
          description: 'Webhook created successfully. The `privateKey` field is only returned in this response and cannot be retrieved again.'
          content:
            application/json:
              schema:
                title: Webhook
                properties:
                  id: { description: 'The ID of the webhook.', type: string, example: '4' }
                  name: { description: 'The name of the webhook.', type: string, example: 'Example Webhook' }
                  created: { description: 'Datetime when the webhook was created (UTC, format: YYYY-MM-DD HH:MM:SS).', type: string, example: '2021-09-20 22:38:01' }
                  lastSent: { description: 'Datetime when the webhook was last fired (UTC, format: YYYY-MM-DD HH:MM:SS). Null if the webhook has never fired.', type: [string, 'null'], example: '2021-09-20 22:38:01' }
                  monitorFields: { description: 'A list of fields to monitor. Null when the webhook is not configured to monitor fields (e.g. event-only webhooks).', example: [firstName, lastName], oneOf: [{ type: array, items: { type: string } }, { type: 'null' }] }
                  postFields: { description: 'An object map of field ID or alias to the external name used in the webhook payload.', type: object, default: {  }, example: { firstName: Name, lastName: Surname, dateOfBirth: DOB } }
                  url: { description: 'The URL the webhook sends data to.', type: string, example: 'https://www.example.com' }
                  format: { description: 'The payload format used by the webhook.', type: string, enum: [json, form-encoded], example: json }
                  privateKey: { description: 'The private key used to verify webhook authenticity via HMAC-SHA256. Only returned at creation time.', type: string }
                  includeCompanyDomain: { description: 'Whether the company domain is added to the webhook request header.', type: boolean, example: false }
                  events: { description: 'Events that trigger this webhook.', type: array, items: { $ref: '#/components/schemas/WebhookEventType' }, example: [employee.created, employee.updated, employee.deleted] }
                type: object
        '400':
          description: 'Request body is malformed or missing required fields. Common causes: missing `format`, missing `monitorFields` when required by the selected events, URL not starting with `https://`, or an invalid `format` value.'
          content:
            application/json:
              schema:
                title: CreateWebhookBadRequestResponse
                oneOf:
                  - { $ref: '#/components/schemas/WebhookBadRequest' }
                  - { $ref: '#/components/schemas/WebhookError' }
        '401':
          description: 'The user API key is invalid.'
          content:
            application/json: {  }
        '403':
          description: 'The authenticated user does not have permission to access one or more of the specified fields. The response lists which `monitorFields`, `postFields`, and `unknownFields` caused the violation.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookError'
        '500':
          description: 'Internal error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookError'
      security:
        -
          basic: []
        -
          oauth:
            - webhooks
  '/api/v1/webhooks/{id}':
    get:
      tags:
        - Webhooks
        - 'Public API'
      summary: 'Get Webhook'
      description: 'Returns the full configuration of a single webhook owned by the authenticated user API key, including its name, URL, format, monitored fields, post fields, events, creation datetime, and last-sent datetime. Returns 403 if the webhook exists but belongs to a different user API key, and 404 if the webhook does not exist.'
      operationId: get-webhook
      parameters:
        -
          name: id
          in: path
          description: 'The webhook ID to display details about.'
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 'The full configuration of the requested webhook.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebHookResponse'
        '401':
          description: 'The user API key is invalid.'
          content:
            application/json: {  }
        '403':
          description: 'The API user key does not have permission to see the requested webhook.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookError'
        '404':
          description: 'The webhook does not exist.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookError'
        '500':
          description: 'Internal error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookError'
      security:
        -
          basic: []
        -
          oauth:
            - webhooks
    put:
      tags:
        - Webhooks
        - 'Public API'
      summary: 'Update Webhook'
      description: 'Performs a full replacement update of a webhook. All fields in the request body replace the existing values. The `format` field is required. The `monitorFields` array is required when `events` includes `employee.updated` or `employee_with_fields.updated`. Returns 403 if the webhook belongs to a different user or if field permission violations are present, and 404 if the webhook does not exist.'
      operationId: update-webhook
      parameters:
        -
          name: id
          in: path
          description: 'The webhook ID to update.'
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewWebHook'
      responses:
        '200':
          description: 'Webhook updated successfully.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebHookResponse'
        '400':
          description: 'Request body is malformed or missing required fields. Common causes: missing `format`, missing `monitorFields` when required by the selected events, URL not starting with `https://`, or an invalid `format` value.'
          content:
            application/json:
              schema:
                title: UpdateWebhookBadRequestResponse
                oneOf:
                  - { $ref: '#/components/schemas/WebhookBadRequest' }
                  - { $ref: '#/components/schemas/WebhookError' }
        '401':
          description: 'The user API key is invalid.'
          content:
            application/json: {  }
        '403':
          description: 'The authenticated user does not have permission to access one or more of the specified fields, or does not have access to the webhook. When caused by field permission violations, `errors` is an array and lists which `monitorFields`, `postFields`, and `unknownFields` caused the violation. When caused by webhook ownership denial, `errors` is an object with a single `error` string (e.g. `{"errors":{"error":"You do not have access to webhook ID: 6"}}`).'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookError'
        '404':
          description: 'The webhook to be updated doesn\''t exist.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookError'
        '500':
          description: 'Internal error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookError'
      security:
        -
          basic: []
        -
          oauth:
            - webhooks
    delete:
      tags:
        - Webhooks
        - 'Public API'
      summary: 'Delete Webhook'
      description: 'Deletes a webhook tied to the authenticated user API key. Returns 403 if the webhook belongs to a different user API key, and 404 if the webhook does not exist. On success, returns a plain text confirmation message.'

                  - { type: string }
                  - { type: 'null' }
              name:
                type: string
            type: object
        monitorFields:
          type: array
          items:
            properties:
              id:
                oneOf:
                  - { type: integer }
                  - { type: string }
              name:
                type: string
            type: object
        duplicatePostString:
          type: array
          items:
            type: string
        postFields:
          type: array
          items:
            properties:
              id:
                oneOf:
                  - { type: integer }
                  - { type: string }
              name:
                type: string
            type: object
      type: object
      additionalProperties: false
    DataRequest:

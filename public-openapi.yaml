          schema:
            type: string
            format: date
            example: '2025-01-01'
        -
          name: end
          in: query
          description: 'YYYY-MM-DD. Only show timesheet entries on/before the specified end date. Must be within the last 365 days.'
          required: true
          schema:
            type: string
            format: date
            example: '2025-03-01'

          example:
            field: firstName
            sort: asc
        filters:
          properties:
            match:
              type: string
            filters:
              type: array
              items:
                properties:
                  field: { type: string }
                  operator: { type: string, enum: [contains, does_not_contain, equal, not_equal, empty, not_empty, lt, lte, gt, gte, last, next, range, checked, not_checked, includes, does_not_include] }
                  value: {  }
                type: object
          type: object
          example:
            match: all
            filters:

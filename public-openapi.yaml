  /api/v1/employees:
    get:
      tags:
        - Employees
        - 'Public API'
      summary: 'List Employees'
      description: 'Returns a paginated list of employees with optional filtering and sorting. Each employee record always includes: `employeeId`, `firstName`, `lastName`, `preferredName`, `photoUrl`, `jobTitleName`, and `status`. The `_restrictedFields` property is only present when at least one requested field is restricted by permissions — it is omitted entirely on unrestricted records. Use the `fields` parameter to request up to 14 additional contact/social fields. The `status` field is returned as title-case (e.g., `Active`, `Inactive`). For richer employee field data, use the Get Employee endpoint or the Datasets API.'
      operationId: list-employees
      parameters:
        -
          name: filter
          in: query
          description: 'Filters used to match employees. Encode filter properties using deepObject style. If the caller does not have access to the filtered field on a matching employee, that employee is excluded from the results to avoid leaking sensitive data.'
          required: false
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/GetEmployeesFilterRequestObject'
        -
          name: sort
          in: query
          description: 'Comma-separated list of sortable fields. Prefix a field with "-" for descending order. Allowed fields: `employeeId`, `firstName`, `lastName`, `preferredName`, `jobTitleName`, `status`. Nulls sort first in ascending order and last in descending order. If the caller does not have access to the sort field for an employee, that employee is excluded from the final result set to avoid leaking sensitive information.'
          required: false
          schema:
            type: string
        -
          name: fields
          in: query
          description: 'Comma-separated list of additional fields to include in the response beyond the default set. Supported values: `workEmail`, `homeEmail`, `bestEmail`, `middleName`, `workPhone`, `workPhoneExtension`, `mobilePhone`, `homePhone`, `skypeUsername`, `linkedinUrl`, `facebookUrl`, `instagramUrl`, `twitterUrl`, `pinterestUrl`. Unrecognized field names are silently ignored. Field values are subject to permission checks — restricted fields will be null or omitted and the field name will appear in `_restrictedFields`.'
          required: false
          schema:
            type: string
            example: 'workEmail,mobilePhone'
        -
          name: page
          in: query
          description: 'Cursor-based pagination parameters (`limit`, `after`, `before`).'
          required: false
          style: deepObject
          explode: true
          schema:
            $ref: '#/components/schemas/CursorPaginationQueryObject'
      responses:
        '200':
          description: 'Employees retrieved successfully'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetEmployeesResponseObject'
              examples:
                basic:
                  summary: 'Basic paginated result'
                  value: { data: [{ employeeId: '123', firstName: Ava, lastName: Nguyen, preferredName: Ava, photoUrl: 'https://cdn.example.com/p/123.jpg', jobTitleName: 'Engineering Manager', status: Active }, { employeeId: '124', firstName: Sam, lastName: Park, preferredName: Sam, photoUrl: null, jobTitleName: 'Product Designer', status: Active, _restrictedFields: [photoUrl] }], meta: { total: 2456, page: { limit: 100, nextCursor: eyJjdXJzb3IiOiAiYWZ0ZXItMTI0In0=, prevCursor: null } }, _links: { self: { href: 'https://api.bamboohr.com/api/v1/employees?page%5Blimit%5D=100' }, next: { href: 'https://api.bamboohr.com/api/v1/employees?page%5Blimit%5D=100&page%5Bafter%5D=eyJ...' } } }
                batchByIds:
                  summary: 'Batch fetch by a list of employee IDs'
                  value: { data: [{ employeeId: '200', firstName: Lena, lastName: Smith, preferredName: Lena, photoUrl: null, jobTitleName: 'QA Analyst', status: Active }, { employeeId: '207', firstName: Marco, lastName: Lee, preferredName: null, photoUrl: null, jobTitleName: 'Support Engineer', status: Inactive, _restrictedFields: [photoUrl] }], meta: { total: 2, page: { limit: 2, nextCursor: null, prevCursor: null } }, _links: { self: { href: 'https://api.bamboohr.com/api/v1/employees?filter%5Bids%5D=200%2C207&page%5Blimit%5D=2' } } }
        '400':
          description: 'Bad Request — invalid parameters provided.'
          content:
            application/json:
              schema:
                title: InvalidRequest
                properties:
                  error: { description: 'Error details.', required: [code, message], properties: { code: { description: 'Error code indicating the type of validation failure. For BadPage errors, common causes include: 1) Invalid page parameter format, 2) Using the wrong paging parameter for before/after cursors, or 3) An employee on the page boundary changed between calls (for example, the employee was deleted or no longer matches the filter criteria).', type: string }, message: { description: 'Human-readable message describing the validation failure.', type: string } }, type: object }
                type: object
        '401':
          description: Unauthorized
        '429':
          description: 'Too Many Requests'
        '500':
          description: 'Internal Server Error'
      security:
        -
          oauth:
            - employee
        -
          oauth:
            - 'employee:name'
        -
          oauth:
            - 'employee:job'
    post:
      tags:
        - Employees
        - 'Public API'
      summary: 'Create Employee'
      description: "Create a new employee. At minimum, provide a first name and last name in a JSON object or XML document. The request body schema lists commonly used fields, but any valid employee field name may be included as a key. To discover available field names, call the list-fields endpoint (operationId: list-fields, GET /api/v1/meta/fields).\n\nTrax Payroll note: Employees added to a pay schedule synced with Trax Payroll must include the required payroll-related employee fields: employeeNumber, firstName, lastName, dateOfBirth, ssn or ein, gender, maritalStatus, hireDate, address1, city, state, country, employmentHistoryStatus, exempt, payType, payRate, payPer, location, department, and division."
